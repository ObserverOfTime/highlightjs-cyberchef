name: CI

on:
  push:
    branches: [master]
    paths:
      - src/**
      - test/**
  pull_request:
    paths:
      - src/**
      - test/**

concurrency:
  group: ${{github.workflow}}-${{github.ref}}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone highlight.js
        uses: actions/checkout@v6
        with:
          repository: highlightjs/highlight.js
          path: highlightjs
      - name: Clone grammar
        uses: actions/checkout@v6
        with:
          path: highlightjs/extra/highlightjs-cyberchef
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Build highlight.js
        working-directory: highlightjs
        run: npm i && node ./tools/build.js -t node
      - name: Run markup tests
        working-directory: highlightjs
        run: npm run test-markup
        env:
          ONLY_EXTRA: true
  dist:
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    needs: [test]
    steps:
      - name: Clone highlight.js
        uses: actions/checkout@v6
        with:
          repository: highlightjs/highlight.js
          path: highlightjs
      - name: Clone grammar
        uses: actions/checkout@v6
        with:
          path: highlightjs/extra/highlightjs-cyberchef
          fetch-depth: 0
      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
      - name: Build CDN dist
        working-directory: highlightjs
        run: npm i && node ./tools/build.js -t cdn
      - name: Commit dist files
        working-directory: highlightjs/extra/highlightjs-cyberchef
        run: |-
          if ! git diff --quiet HEAD -- dist; then
            git config user.name 'github-actions[bot]'
            git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
            git commit -am 'Update CDN dist files' && git push
          fi
